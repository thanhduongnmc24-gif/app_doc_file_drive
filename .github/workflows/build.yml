name: Build Android APK Release

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Khởi tạo Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - name: Cài đặt Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cài đặt Android SDK
        uses: android-actions/setup-android@v3

      - name: Cài đặt các thư viện (Ép xung đột phiên bản)
        run: npm install --legacy-peer-deps

      - name: Thực hiện Expo Prebuild sạch sẽ
        run: npx expo prebuild --platform android --clean

      - name: Biên dịch tạo file APK Release
        run: |
          cd android
          ./gradlew clean
          ./gradlew assembleRelease

      - name: Đóng gói và upload file APK lên Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Ung-Dung-Doc-Truyen-Vip-Pro
          path: android/app/build/outputs/apk/release/app-release.apk