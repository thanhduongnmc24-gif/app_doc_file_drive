name: Build Android APK Release

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mã nguồn
        uses: actions/checkout@v4

      - name: Khởi tạo Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Cài đặt Java JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Cài đặt Android SDK
        uses: android-actions/setup-android@v3

      - name: Dọn rác và cài đặt bằng Yarn
        run: |
          rm -rf node_modules package-lock.json
          npm install -g yarn
          yarn install

      - name: Thực hiện Expo Prebuild
        run: npx expo prebuild --platform android --clean

      - name: Khóa cứng cấu hình chip thấp nhất (armeabi-v7a)
        run: |
          cd android
          # Lệnh của Tèo: Ép hệ thống chỉ biên dịch đúng dòng chip v7a siêu nhẹ
          sed -i '/defaultConfig {/a \        ndk { abiFilters "armeabi-v7a" }' app/build.gradle
          ./gradlew assembleRelease --no-daemon

      - name: Đóng gói và upload đúng 1 file APK duy nhất lên Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: App-Doc-Truyen-Sieu-Nhe-Cua-Anh-Hai
          path: android/app/build/outputs/apk/release/app-armeabi-v7a-release.apk